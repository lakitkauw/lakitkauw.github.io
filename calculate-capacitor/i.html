<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National - Sanyo- Panasonic: 125W Water Pump Rewinding Technical Datasheet</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #030712;
            --bg-card: #0b1329;
            --bg-card-hover: #111c3a;
            
            /* Running Winding Step Colors */
            --primary-1: #38bdf8; /* Step 1 (Slots 1-10 / 13-22) - Light Blue */
            --primary-2: #818cf8; /* Step 2 (Slots 2-11 / 14-23) - Indigo */
            --primary-3: #f472b6; /* Step 3 (Slots 3-12 / 15-24) - Pink/Magenta */
            
            /* Starting Winding Step Colors */
            --secondary-1: #34d399; /* Step 1 (Slots 7-16 / 19-4) - Emerald Green */
            --secondary-2: #fbbf24; /* Step 2 (Slots 8-17 / 20-5) - Amber/Yellow */
            --secondary-3: #f97316; /* Step 3 (Slots 9-18 / 21-6) - Orange */
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #fbbf24;
            --border-color: #1f2937;
            --danger: #f87171;
            
            /* Inactive Elements */
            --inactive-element: #1f2937;
            --inactive-slot: #374151;
        }

        /* Print Override */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            .no-print, .diag-tab, .tab-btn {
                display: none !important;
            }
            .dashboard-grid {
                display: block !important;
            }
            .card {
                background: white !important;
                border: 1px solid #ccc !important;
                color: black !important;
                page-break-inside: avoid;
                margin-bottom: 20px;
                box-shadow: none !important;
            }
            .val, .slot-highlight, .conn-val, h1, h2, h3, th, td {
                color: black !important;
            }
            svg {
                filter: invert(1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header-title-area {
            margin-bottom: 12px;
            @media (min-width: 768px) { margin-bottom: 0; }
        }

        .brand-badge {
            display: inline-block;
            background: linear-gradient(90deg, #1e3a8a, #030712);
            border: 1px solid var(--primary-1);
            color: var(--primary-1);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            border-color: var(--primary-1);
            background-color: var(--bg-card-hover);
            color: var(--primary-1);
        }

        /* MAIN RESPONSIVE GRID Layout */
        .dashboard-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        /* CARD COMPONENT */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* CORE SPECS CARD (SIDEBAR ON DESKTOP) */
        .specs-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .specs-grid-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .spec-item {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .spec-item:hover {
            border-color: rgba(56, 189, 248, 0.2);
            background-color: rgba(56, 189, 248, 0.03);
        }

        .spec-item i {
            font-size: 16px;
            color: var(--primary-1);
            margin-bottom: 4px;
        }

        .spec-item .val {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            display: block;
        }

        .spec-item .lbl {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* INTERACTIVE SCHEMATICS COMPONENT */
        .main-workspace {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .visualizer-card {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: center;
        }

        @media (min-width: 768px) {
            .visualizer-card {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .diagram-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020617;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stator-svg {
            width: 100%;
            max-width: 280px;
            height: auto;
            transform: rotate(0deg);
            transition: transform 0.5s ease;
        }

        /* SVG Inner Styling */
        .stator-ring-out { fill: none; stroke: #1f2937; stroke-width: 1; }
        .stator-ring-in { fill: none; stroke: #374151; stroke-width: 1; stroke-dasharray: 2,2; }
        
        .slot-node {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .slot-node.running-slot {
            fill: #0ea5e9; /* Running slots are always Blue */
        }

        .slot-node.starting-slot {
            fill: #10b981; /* Starting slots are always Green */
        }

        .slot-node:hover {
            r: 4;
            fill: #ffffff !important;
        }

        .coil-arc {
            fill: none;
            stroke-linecap: round;
            opacity: 0.1; /* Inactive element fading level */
            transition: all 0.3s ease;
            stroke-width: 1;
            stroke: var(--inactive-element);
            cursor: pointer;
        }

        /* Map step CSS variables to visualizer classes */
        .rc-step-0 { --step-color: var(--primary-1); }
        .rc-step-1 { --step-color: var(--primary-2); }
        .rc-step-2 { --step-color: var(--primary-3); }

        .sc-step-0 { --step-color: var(--secondary-1); }
        .sc-step-1 { --step-color: var(--secondary-2); }
        .sc-step-2 { --step-color: var(--secondary-3); }

        /* ALL VIEW STATE */
        .all-view .coil-arc.running-coil { stroke: var(--step-color); opacity: 0.7; }
        .all-view .coil-arc.starting-coil { stroke: var(--step-color); opacity: 0.7; }
        .all-view .slot-node { opacity: 1; }

        /* RUNNING VIEW STATE - Glow Effect Removed */
        .run-view .coil-arc.running-coil { stroke: var(--step-color); opacity: 1; stroke-width: 1; }
        .run-view .slot-node.running-slot { opacity: 1; r: 3.2; }
        .run-view .coil-arc.starting-coil { opacity: 0.05; stroke: var(--inactive-element); }
        .run-view .slot-node.starting-slot { opacity: 0.20; } /* Remain green but faded */

        /* STARTING VIEW STATE - Glow Effect Removed */
        .start-view .coil-arc.starting-coil { stroke: var(--step-color); opacity: 1; stroke-width: 1; }
        .start-view .slot-node.starting-slot { opacity: 1; r: 3.2; }
        .start-view .coil-arc.running-coil { opacity: 0.05; stroke: var(--inactive-element); }
        .start-view .slot-node.running-slot { opacity: 0.20; } /* Remain blue but faded */

        /* FOCUSED/HOVER MODE STATE */
        .stator-svg.focused-mode .coil-arc:not(.temp-highlight-arc) {
            opacity: 0.02 !important;
            filter: none !important;
        }
        .stator-svg.focused-mode .slot-node:not(.temp-highlight-slot) {
            opacity: 0.20 !important; /* Keep slot holes transparent running-blue / starting-green */
        }

        /* Dynamic Slot Hover Highlighting - Glow Effect Removed */
        .stator-svg .coil-arc.temp-highlight-arc {
            stroke: var(--step-color) !important;
            opacity: 1 !important;
            stroke-width: 1 !important;
        }
        .stator-svg .slot-node.temp-highlight-slot {
            r: 4.5 !important;
            opacity: 1 !important;
        }

        /* DIAGRAM CONTROLS */
        .diagram-controls {
            width: 100%;
        }

        .tab-box {
            display: flex;
            background: #111827;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: #3b82f6;
            color: #ffffff;
        }

        .tab-btn.active.starting-btn {
            background-color: #10b981;
            color: #ffffff;
        }

        .tab-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            background-color: rgba(255,255,255,0.01);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--primary-1);
        }

        /* WINDING DATA BLOCKS (FLEXIBLE ROW GRID) */
        .winding-tables-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .winding-tables-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .winding-block {
            border-top: 4px solid var(--primary-1);
        }
        .winding-block.starting-block {
            border-top-color: var(--secondary-1);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .block-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .running-title { color: var(--primary-1); }
        .starting-title { color: var(--secondary-1); }

        .wire-pill {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .meta-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 12px;
            text-align: center;
        }

        .meta-strip .lbl {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .meta-strip .val {
            font-size: 11px;
            font-weight: 800;
            color: #ffffff;
        }

        /* DATA TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-size: 9px;
            text-transform: uppercase;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 6px 4px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
            transition: background-color 0.2s ease;
        }

        tr.table-row-interactive:hover td {
            background-color: rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .slot-highlight {
            color: #ffffff;
            font-weight: 700;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* INTERNAL WIRING SCHEME */
        .connection-card-full {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .schematic-diagram {
            background: #020617;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .wire-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.01);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            min-width: 100px;
        }

        .wire-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .color-black { background-color: #000; border-color: #555; }
        .color-red { background-color: #ef4444; }
        .color-yellow { background-color: #A9A9A9; }

        .wire-node .node-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-main);
        }

        .wire-node .node-sub {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .wire-connector-line {
            height: 2px;
            background: #1f2937;
            flex-grow: 1;
            max-width: 40px;
            position: relative;
            @media (max-width: 600px) { display: none; }
        }

        /* DETAILED STEP-BY-STEP LEGEND */
        .step-legend-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 12px;
            width: 100%;
        }

        @media (min-width: 576px) {
            .step-legend-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .legend-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .legend-group-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .legend-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .legend-row.active-focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }

        .legend-row.active-focus.run-focus-0 { border-color: var(--primary-1); color: var(--primary-1); }
        .legend-row.active-focus.run-focus-1 { border-color: var(--primary-2); color: var(--primary-2); }
        .legend-row.active-focus.run-focus-2 { border-color: var(--primary-3); color: var(--primary-3); }
        .legend-row.active-focus.start-focus-0 { border-color: var(--secondary-1); color: var(--secondary-1); }
        .legend-row.active-focus.start-focus-1 { border-color: var(--secondary-2); color: var(--secondary-2); }
        .legend-row.active-focus.start-focus-2 { border-color: var(--secondary-3); color: var(--secondary-3); }

        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* TECHNICAL TOOLBOX (INTEGRATED ESTIMATOR) */
        .toolbox-card {
            border-left: 4px solid var(--accent);
        }

        .toolbox-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            .toolbox-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .tool-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-input-group label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .tool-input-group input, .tool-input-group select {
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #ffffff;
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .tool-results {
            background-color: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.1);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
        }

        .result-item {
            display: flex;
            flex-direction: column;
        }

        .result-lbl {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .result-val {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        footer {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            margin-top: 30px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- MAIN HEADER -->
    <header>
        <div class="header-title-area">
            <div class="brand-badge">National • Sanyo • Panasonic</div>
            <h1>125W WATER PUMP REWINDING TECHNICAL DATASHEET</h1>
            <div class="subtitle">Standard Single-Phase 2-Pole Core  (Core Depth: 3.6 cm)</div>
            <div class="subtitle">By Lak It Kauw</div>
        </div>
        <div class="action-buttons no-print">
            <button class="btn" onclick="toggleStatorSpin()"><i class="fa-solid fa-rotate"></i> Rotate Visualizer</button>
            <button class="btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Export / Print Data</button>
        </div>
    </header>

    <!-- MAIN DASHBOARD GRID -->
    <main class="dashboard-grid">
        
        <!-- SIDEBAR PANEL (MOTOR SPECIFICATIONS) -->
        <section class="specs-sidebar">
        </section>

        <!-- MAIN WORKSPACE -->
        <section class="main-workspace">
            
     <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 p-8">
        <h1 class="text-2xl font-extrabold text-white mb-2"><i class="fas fa-bolt text-blue-400 mr-2"></i>Capacitor Calculator</h1>
        <p class="text-sm text-gray-400 mb-6 font-mono">Estimate based on Starting & Running Current.</p>

        <div class="bg-gray-900 p-6 rounded-xl mb-8 border border-gray-700 flex justify-center">
            <svg width="240" height="70" viewBox="0 0 240 70" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="40" fill="#e2e8f0" font-family="JetBrains Mono" font-size="20" font-style="italic">C = </text>
                <line x1="40" y1="33" x2="230" y2="33" stroke="#e2e8f0" stroke-width="2" />
                <text x="50" y="25" fill="#e2e8f0" font-family="JetBrains Mono" font-size="16" font-style="italic">((Iₛ + 2 × Iᵣ) / 3) × 10⁶</text>
                <text x="80" y="58" fill="#e2e8f0" font-family="JetBrains Mono" font-size="16" font-style="italic">2πfV</text>
            </svg>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300">Starting Current (Iₛ) in Amps:</label>
                <input type="number" id="iStart" step="0.01" class="w-full mt-2 p-3 bg-gray-900 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="eg. 1.20">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300">Running Current (Iᵣ) in Amps:</label>
                <input type="number" id="iRun" step="0.01" class="w-full mt-2 p-3 bg-gray-900 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="eg. 0.75">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300">Freq (Hz):</label>
                    <input type="number" id="freq" value="50" class="w-full mt-2 p-3 bg-gray-900 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300">Voltage (V):</label>
                    <input type="number" id="volt" value="220" class="w-full mt-2 p-3 bg-gray-900 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="hitungKapasitor()" class="flex-1 panasonic-blue text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all">
                    <i class="fas fa-calculator mr-2"></i>Calculate
                </button>
                <button onclick="clearFields()" class="px-6 bg-gray-700 text-gray-300 font-bold py-3 rounded-lg hover:bg-gray-600 transition-all">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>

        <div id="hasilContainer" class="mt-8 p-5 bg-gray-900 rounded-xl border border-gray-700 hidden">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Estimated Result:</h2>
            <p id="hasil" class="text-4xl font-bold panasonic-blue-text mt-2"></p>
        </div>
    </div>

    <script>
        function hitungKapasitor() {
            const is = parseFloat(document.getElementById('iStart').value);
            const ir = parseFloat(document.getElementById('iRun').value);
            const f = parseFloat(document.getElementById('freq').value);
            const v = parseFloat(document.getElementById('volt').value);

            if (isNaN(is) || isNaN(ir) || isNaN(f) || isNaN(v)) return;

            const iAvg = (is + (2 * ir)) / 3;
            const c = (iAvg * 1000000) / (2 * Math.PI * f * v);

            document.getElementById('hasil').innerText = c.toFixed(2) + " μF";
            document.getElementById('hasilContainer').classList.remove('hidden');
        }

        function clearFields() {
            document.getElementById('iStart').value = '';
            document.getElementById('iRun').value = '';
            // Reset ke default standar (opsional)
            // document.getElementById('freq').value = '50';
            // document.getElementById('volt').value = '220';
            document.getElementById('hasilContainer').classList.add('hidden');
        }
    </script>
        </section>
    </main>

    <footer>
    </footer>

</body>
